<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Meta Ads Budget Planner</title>
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'League Spartan',sans-serif; background:#010f06; color:#e0ffe0; min-height:100vh; overflow-x:hidden; }

    #bg-canvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none; }

    .wrap { position:relative; z-index:1; max-width:980px; margin:0 auto; padding:28px 16px 60px; }

    /* HEADER */
    .header { text-align:center; padding:24px 0 32px; }
    .header h1 { font-size:2.4rem; font-weight:900; letter-spacing:3px; text-transform:uppercase; line-height:1.1; }
    .header h1 span {
      background:linear-gradient(90deg,#00ff87,#00e676,#69ff47,#00e676,#00ff87);
      background-size:300% auto;
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      animation:shimmer 3s linear infinite;
    }
    @keyframes shimmer { 0%{background-position:0% center} 100%{background-position:300% center} }
    .header p { font-size:13px; letter-spacing:2px; color:rgba(0,230,118,0.45); text-transform:uppercase; margin-top:8px; font-weight:700; }

    /* TABS */
    .tabs { display:flex; gap:6px; justify-content:center; margin-bottom:24px; flex-wrap:wrap; }
    .tab-btn {
      background:rgba(0,230,118,0.06); border:1px solid rgba(0,230,118,0.2);
      color:rgba(0,230,118,0.5); border-radius:8px; padding:8px 20px;
      font-family:'League Spartan',sans-serif; font-size:13px; font-weight:700;
      letter-spacing:1px; cursor:pointer; transition:all 0.2s; text-transform:uppercase;
    }
    .tab-btn:hover { background:rgba(0,230,118,0.12); color:rgba(0,230,118,0.8); }
    .tab-btn.active { background:rgba(0,230,118,0.15); border-color:#00e676; color:#00ff87; box-shadow:0 0 16px rgba(0,230,118,0.2); }

    /* GLASS CARD */
    .card {
      background:rgba(0,230,118,0.03);
      border:1px solid rgba(0,230,118,0.15);
      border-radius:18px; padding:24px;
      margin-bottom:20px;
      box-shadow:0 4px 32px rgba(0,0,0,0.4);
    }

    .card-title {
      font-size:11px; font-weight:700; letter-spacing:2.5px;
      text-transform:uppercase; color:rgba(0,230,118,0.5);
      margin-bottom:18px; display:flex; align-items:center; gap:10px;
    }
    .card-title::after { content:''; flex:1; height:1px; background:rgba(0,230,118,0.1); }

    /* INPUTS */
    .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; }

    .field { display:flex; flex-direction:column; gap:6px; }
    .field label { font-size:11px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:rgba(0,230,118,0.45); }
    .input-row {
      display:flex; align-items:center;
      background:rgba(0,230,118,0.05);
      border:1px solid rgba(0,230,118,0.2);
      border-radius:10px; overflow:hidden;
      transition:border 0.2s, box-shadow 0.2s;
    }
    .input-row:focus-within { border-color:#00e676; box-shadow:0 0 0 3px rgba(0,230,118,0.1); }
    .prefix {
      padding:10px 12px; font-size:13px; font-weight:700;
      color:rgba(0,230,118,0.4);
      background:rgba(0,230,118,0.08);
      border-right:1px solid rgba(0,230,118,0.15);
    }
    .suffix {
      padding:10px 12px; font-size:13px; font-weight:700;
      color:rgba(0,230,118,0.4);
      background:rgba(0,230,118,0.08);
      border-left:1px solid rgba(0,230,118,0.15);
    }
    .input-row input, .input-row select {
      flex:1; background:none; border:none; outline:none;
      color:#e0ffe0; font-family:'League Spartan',sans-serif;
      font-size:15px; font-weight:600; padding:10px 14px; width:100%;
    }
    .input-row input::placeholder { color:rgba(0,230,118,0.2); }
    .input-row select option { background:#021a0a; color:#e0ffe0; }

    /* CALC BTN */
    .calc-btn {
      width:100%; padding:14px;
      background:linear-gradient(135deg,#00e676,#00c853);
      color:#010f06; border:none; border-radius:12px;
      font-family:'League Spartan',sans-serif;
      font-size:16px; font-weight:900; letter-spacing:2px;
      text-transform:uppercase; cursor:pointer;
      transition:all 0.2s; margin-top:4px;
    }
    .calc-btn:hover { background:linear-gradient(135deg,#00ff87,#00e676); box-shadow:0 0 24px rgba(0,230,118,0.4); transform:translateY(-1px); }
    .calc-btn:active { transform:scale(0.98); }

    /* RESULTS */
    .results-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
    .metric {
      background:rgba(0,230,118,0.05);
      border:1px solid rgba(0,230,118,0.15);
      border-radius:14px; padding:16px;
      text-align:center; transition:border 0.2s, box-shadow 0.2s;
    }
    .metric.highlight { border-color:#00e676; background:rgba(0,230,118,0.1); box-shadow:0 0 20px rgba(0,230,118,0.15); }
    .metric.profit-pos { border-color:#00e676; background:rgba(0,230,118,0.08); }
    .metric.profit-neg { border-color:#ff4444; background:rgba(255,68,68,0.08); }
    .metric-val { font-size:1.6rem; font-weight:900; color:#00ff87; letter-spacing:1px; }
    .metric-val.neg { color:#ff6666; }
    .metric-lbl { font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:rgba(0,230,118,0.4); margin-top:5px; }

    /* SCALE TABLE */
    .scale-table { width:100%; border-collapse:collapse; font-size:13px; }
    .scale-table th { background:rgba(0,230,118,0.08); padding:10px 14px; text-align:left; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:rgba(0,230,118,0.5); border-bottom:1px solid rgba(0,230,118,0.1); font-size:11px; }
    .scale-table td { padding:10px 14px; border-bottom:1px solid rgba(0,230,118,0.06); color:#c0ffd0; font-weight:600; }
    .scale-table tr:last-child td { border-bottom:none; }
    .scale-table tr:hover td { background:rgba(0,230,118,0.04); }
    .scale-table .current-row td { background:rgba(0,230,118,0.08); color:#00ff87; }
    .badge-profit { background:rgba(0,230,118,0.15); color:#00ff87; padding:2px 8px; border-radius:20px; font-size:11px; font-weight:700; }
    .badge-loss { background:rgba(255,68,68,0.15); color:#ff6666; padding:2px 8px; border-radius:20px; font-size:11px; font-weight:700; }

    /* BREAKEVEN BAR */
    .be-bar-wrap { margin-top:10px; }
    .be-bar-track { height:10px; background:rgba(0,230,118,0.1); border-radius:10px; overflow:hidden; margin:8px 0 4px; }
    .be-bar-fill { height:100%; border-radius:10px; background:linear-gradient(90deg,#00e676,#00ff87); transition:width 0.6s ease; }
    .be-bar-labels { display:flex; justify-content:space-between; font-size:11px; color:rgba(0,230,118,0.4); font-weight:700; letter-spacing:1px; }

    .hidden { display:none; }

    /* RESET */
    .reset-btn {
      background:none; border:1px solid rgba(0,230,118,0.15);
      color:rgba(0,230,118,0.3); border-radius:8px; padding:8px 20px;
      font-family:'League Spartan',sans-serif; font-size:12px;
      font-weight:700; letter-spacing:1px; cursor:pointer;
      transition:all 0.2s; text-transform:uppercase;
    }
    .reset-btn:hover { border-color:rgba(0,230,118,0.4); color:rgba(0,230,118,0.6); }

    .footer-row { display:flex; justify-content:center; gap:12px; margin-top:8px; }

    /* MOBILE */
    @media(max-width:640px) {
      .grid-2,.grid-3 { grid-template-columns:1fr; }
      .results-grid { grid-template-columns:1fr 1fr; }
      .header h1 { font-size:1.7rem; }
      .scale-table { font-size:11px; }
      .scale-table th, .scale-table td { padding:8px 8px; }
    }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="wrap">

  <div class="header">
    <h1>META ADS<br><span>BUDGET PLANNER</span></h1>
    <p>by Desi Rich Kid</p>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchMode('budget')">Plan by Budget</button>
    <button class="tab-btn" onclick="switchMode('orders')">Plan by Orders</button>
    <button class="tab-btn" onclick="switchMode('revenue')">Plan by Revenue</button>
  </div>

  <!-- INPUTS CARD -->
  <div class="card">
    <div class="card-title">Your Campaign Details</div>

    <!-- MODE: BUDGET -->
    <div id="mode-budget">
      <div class="grid-2" style="margin-bottom:14px">
        <div class="field">
          <label>Daily Ad Budget</label>
          <div class="input-row"><span class="prefix">₹</span><input type="number" id="b_daily" placeholder="1000" oninput="syncBudgets('daily')"></div>
        </div>
        <div class="field">
          <label>Monthly Ad Budget</label>
          <div class="input-row"><span class="prefix">₹</span><input type="number" id="b_monthly" placeholder="30000" oninput="syncBudgets('monthly')"></div>
        </div>
      </div>
      <div class="grid-3">
        <div class="field">
          <label>Product Cost (₹)</label>
          <div class="input-row"><span class="prefix">₹</span><input type="number" id="b_cogs" placeholder="200"></div>
        </div>
        <div class="field">
          <label>Selling Price (₹)</label>
          <div class="input-row"><span class="prefix">₹</span><input type="number" id="b_sp" placeholder="599"></div>
        </div>
        <div class="field">
          <label>Expected CPO (₹)</label>
          <div class="input-row"><span class="prefix">₹</span><input type="number" id="b_cpo" placeholder="150"></div>
        </div>
      </div>
    </div>

    <!-- MODE: ORDERS -->
    <div id="mode-orders" class="hidden">
      <div class="grid-2" style="margin-bottom:14px">
        <div class="field">
          <label>Target Daily Orders</label>
          <div class="input-row"><span class="prefix">#</span><input type="number" id="o_daily" placeholder="20" oninput="syncOrders('daily')"></div>
        </div>
        <div class="field">
          <label>Target Monthly Orders</label>
          <div class="input-row"><span class="prefix">#</span><input type="number" id="o_monthly" placeholder="600" oninput="syncOrders('monthly')"></div>
        </div>
      </div>
      <div class="grid-3">
        <div class="field">
          <label>Product Cost (₹)</label>
          <div class="input-row"><span class="prefix">₹</span><input type="number" id="o_cogs" placeholder="200"></div>
        </div>
        <div class="field">
          <label>Selling Price (₹)</label>
          <div class="input-row"><span class="prefix">₹</span><input type="number" id="o_sp" placeholder="599"></div>
        </div>
        <div class="field">
          <label>Expected CPO (₹)</label>
          <div class="input-row"><span class="prefix">₹</span><input type="number" id="o_cpo" placeholder="150"></div>
        </div>
      </div>
    </div>

    <!-- MODE: REVENUE -->
    <div id="mode-revenue" class="hidden">
      <div class="grid-2" style="margin-bottom:14px">
        <div class="field">
          <label>Target Daily Revenue</label>
          <div class="input-row"><span class="prefix">₹</span><input type="number" id="r_daily" placeholder="12000" oninput="syncRevenue('daily')"></div>
        </div>
        <div class="field">
          <label>Target Monthly Revenue</label>
          <div class="input-row"><span class="prefix">₹</span><input type="number" id="r_monthly" placeholder="360000" oninput="syncRevenue('monthly')"></div>
        </div>
      </div>
      <div class="grid-3">
        <div class="field">
          <label>Product Cost (₹)</label>
          <div class="input-row"><span class="prefix">₹</span><input type="number" id="r_cogs" placeholder="200"></div>
        </div>
        <div class="field">
          <label>Selling Price (₹)</label>
          <div class="input-row"><span class="prefix">₹</span><input type="number" id="r_sp" placeholder="599"></div>
        </div>
        <div class="field">
          <label>Expected CPO (₹)</label>
          <div class="input-row"><span class="prefix">₹</span><input type="number" id="r_cpo" placeholder="150"></div>
        </div>
      </div>
    </div>

    <div style="margin-top:18px">
      <button class="calc-btn" onclick="calculate()">Calculate Plan &#x26A1;</button>
    </div>
  </div>

  <!-- RESULTS -->
  <div class="card hidden" id="results-card">
    <div class="card-title">Daily Results</div>
    <div class="results-grid" id="results-grid"></div>

    <!-- BREAKEVEN BAR -->
    <div class="be-bar-wrap" id="be-bar-wrap" style="margin-top:20px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <span style="font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(0,230,118,0.45)">Break-even Progress</span>
        <span style="font-size:12px;font-weight:800;color:#00ff87" id="be-pct">0%</span>
      </div>
      <div class="be-bar-track"><div class="be-bar-fill" id="be-bar" style="width:0%"></div></div>
      <div class="be-bar-labels"><span id="be-label-left">₹0 spend</span><span id="be-label-right">Break-even: ₹0</span></div>
    </div>
  </div>

  <!-- MONTHLY SUMMARY -->
  <div class="card hidden" id="monthly-card">
    <div class="card-title">Monthly Summary</div>
    <div class="results-grid" id="monthly-grid"></div>
  </div>

  <!-- SCALE TABLE -->
  <div class="card hidden" id="scale-card">
    <div class="card-title">Budget Scaling Projections</div>
    <div style="overflow-x:auto">
      <table class="scale-table" id="scale-table">
        <thead>
          <tr>
            <th>Daily Budget</th>
            <th>Monthly Budget</th>
            <th>Est. Orders/Day</th>
            <th>Revenue/Day</th>
            <th>Profit/Day</th>
            <th>ROAS</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="scale-body"></tbody>
      </table>
    </div>
  </div>

  <div class="footer-row">
    <button class="reset-btn" onclick="resetAll()">Reset All</button>
  </div>

</div>

<script>
/* BG — Constellation map with mouse gravity wells */
(function() {
  var canvas = document.getElementById('bg-canvas');
  var ctx = canvas.getContext('2d');
  var W, H;
  var mouse = { x: 500, y: 400 };
  var t = 0;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);
  window.addEventListener('mousemove', function(e) { mouse.x = e.clientX; mouse.y = e.clientY; });

  /* stars — fixed background twinkle */
  var stars = [];
  for (var i = 0; i < 120; i++) {
    stars.push({
      x: Math.random() * 1920,
      y: Math.random() * 1080,
      r: Math.random() * 1.2 + 0.2,
      phase: Math.random() * Math.PI * 2,
      speed: 0.02 + Math.random() * 0.04
    });
  }

  /* constellation nodes — attracted to mouse */
  var nodes = [];
  var NODE_COUNT = 40;
  for (var i = 0; i < NODE_COUNT; i++) {
    nodes.push({
      x: Math.random() * 1920,
      y: Math.random() * 1080,
      ox: 0, oy: 0,
      vx: (Math.random() - 0.5) * 0.5,
      vy: (Math.random() - 0.5) * 0.5,
      r: Math.random() * 2.5 + 1,
      phase: Math.random() * Math.PI * 2,
      hue: 130 + Math.random() * 40
    });
    nodes[i].ox = nodes[i].x;
    nodes[i].oy = nodes[i].y;
  }

  /* wormhole — spins at mouse position */
  var wormAngle = 0;

  /* trailing comet */
  var comet = { x: -200, y: 200, vx: 4, vy: 1.2, trail: [] };

  function draw() {
    ctx.clearRect(0, 0, W, H);
    t += 0.014;
    wormAngle += 0.025;

    /* twinkling stars */
    stars.forEach(function(s) {
      s.phase += s.speed;
      var a = 0.1 + 0.2 * Math.abs(Math.sin(s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(200,255,220,' + a + ')';
      ctx.fill();
    });

    /* constellation lines between close nodes */
    for (var i = 0; i < nodes.length; i++) {
      for (var j = i + 1; j < nodes.length; j++) {
        var dx = nodes[i].x - nodes[j].x;
        var dy = nodes[i].y - nodes[j].y;
        var d = Math.sqrt(dx * dx + dy * dy);
        if (d < 160) {
          var lineAlpha = 0.08 * (1 - d / 160);
          /* boost line brightness if near mouse */
          var mx = (nodes[i].x + nodes[j].x) / 2 - mouse.x;
          var my = (nodes[i].y + nodes[j].y) / 2 - mouse.y;
          var md = Math.sqrt(mx * mx + my * my);
          if (md < 200) lineAlpha += (1 - md / 200) * 0.15;
          ctx.beginPath();
          ctx.moveTo(nodes[i].x, nodes[i].y);
          ctx.lineTo(nodes[j].x, nodes[j].y);
          ctx.strokeStyle = 'rgba(0,230,118,' + lineAlpha + ')';
          ctx.lineWidth = 0.6;
          ctx.stroke();
        }
      }
    }

    /* update & draw nodes */
    nodes.forEach(function(p) {
      p.phase += 0.02;
      /* gravity toward mouse */
      var mx = mouse.x - p.x, my = mouse.y - p.y;
      var md = Math.sqrt(mx * mx + my * my);
      if (md < 220 && md > 0) {
        var f = (1 - md / 220) * 0.04;
        p.vx += mx * f;
        p.vy += my * f;
      }
      /* gentle return to origin */
      p.vx += (p.ox - p.x) * 0.012;
      p.vy += (p.oy - p.y) * 0.012;
      p.vx *= 0.9; p.vy *= 0.9;
      p.x += p.vx; p.y += p.vy;

      var dm = Math.sqrt(Math.pow(mouse.x - p.x, 2) + Math.pow(mouse.y - p.y, 2));
      var glow = dm < 180 ? (1 - dm / 180) : 0;
      var r = p.r + glow * 4;
      var alpha = 0.4 + glow * 0.6;

      /* outer glow */
      if (glow > 0.1) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, r + 4, 0, Math.PI * 2);
        ctx.fillStyle = 'hsla(' + p.hue + ',100%,65%,' + (glow * 0.2) + ')';
        ctx.fill();
      }
      ctx.beginPath();
      ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
      ctx.fillStyle = 'hsla(' + p.hue + ',100%,70%,' + alpha + ')';
      ctx.fill();
    });

    /* spinning wormhole rings at mouse */
    for (var ring = 0; ring < 4; ring++) {
      var ringR = 30 + ring * 22;
      var ringAlpha = 0.06 - ring * 0.01;
      var segments = 20;
      for (var s = 0; s < segments; s++) {
        var a1 = (Math.PI * 2 / segments) * s + wormAngle * (ring % 2 === 0 ? 1 : -1);
        var a2 = (Math.PI * 2 / segments) * (s + 0.6) + wormAngle * (ring % 2 === 0 ? 1 : -1);
        ctx.beginPath();
        ctx.arc(mouse.x, mouse.y, ringR, a1, a2);
        ctx.strokeStyle = 'rgba(0,255,135,' + (ringAlpha + 0.04 * Math.sin(t * 3 + ring)) + ')';
        ctx.lineWidth = 1.5 - ring * 0.2;
        ctx.stroke();
      }
    }
    /* center dot */
    ctx.beginPath();
    ctx.arc(mouse.x, mouse.y, 3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,255,135,0.6)';
    ctx.fill();

    /* comet */
    comet.trail.push({ x: comet.x, y: comet.y });
    if (comet.trail.length > 40) comet.trail.shift();
    comet.x += comet.vx;
    comet.y += comet.vy;
    if (comet.x > W + 200) { comet.x = -200; comet.y = Math.random() * H; comet.trail = []; }
    for (var i = 0; i < comet.trail.length; i++) {
      var tr = comet.trail[i];
      var ta = (i / comet.trail.length) * 0.35;
      ctx.beginPath();
      ctx.arc(tr.x, tr.y, (i / comet.trail.length) * 2, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0,255,135,' + ta + ')';
      ctx.fill();
    }
    ctx.beginPath();
    ctx.arc(comet.x, comet.y, 3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(180,255,210,0.9)';
    ctx.fill();

    requestAnimationFrame(draw);
  }
  draw();
})();

/* HELPERS */
function v(id) { return parseFloat(document.getElementById(id).value) || 0; }
function fmt(n) { return '&#8377;' + Math.round(n).toLocaleString('en-IN'); }
function fmtN(n) { return Math.round(n).toLocaleString('en-IN'); }

var currentMode = 'budget';

function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
  event.target.classList.add('active');
  ['budget','orders','revenue'].forEach(function(m){
    document.getElementById('mode-'+m).classList.toggle('hidden', m !== mode);
  });
  hideResults();
}

function syncBudgets(from) {
  if (from === 'daily') {
    var d = v('b_daily');
    document.getElementById('b_monthly').value = d ? Math.round(d * 30) : '';
  } else {
    var m = v('b_monthly');
    document.getElementById('b_daily').value = m ? Math.round(m / 30) : '';
  }
}

function syncOrders(from) {
  if (from === 'daily') {
    var d = v('o_daily');
    document.getElementById('o_monthly').value = d ? Math.round(d * 30) : '';
  } else {
    var m = v('o_monthly');
    document.getElementById('o_daily').value = m ? Math.round(m / 30) : '';
  }
}

function syncRevenue(from) {
  if (from === 'daily') {
    var d = v('r_daily');
    document.getElementById('r_monthly').value = d ? Math.round(d * 30) : '';
  } else {
    var m = v('r_monthly');
    document.getElementById('r_daily').value = m ? Math.round(m / 30) : '';
  }
}

function hideResults() {
  ['results-card','monthly-card','scale-card'].forEach(function(id){
    document.getElementById(id).classList.add('hidden');
  });
}

function calculate() {
  var dailyBudget, cogs, sp, cpo;

  if (currentMode === 'budget') {
    dailyBudget = v('b_daily') || v('b_monthly') / 30;
    cogs = v('b_cogs'); sp = v('b_sp'); cpo = v('b_cpo');
  } else if (currentMode === 'orders') {
    var dailyOrders = v('o_daily') || v('o_monthly') / 30;
    cogs = v('o_cogs'); sp = v('o_sp'); cpo = v('o_cpo');
    dailyBudget = dailyOrders * cpo;
  } else {
    var dailyRev = v('r_daily') || v('r_monthly') / 30;
    cogs = v('r_cogs'); sp = v('r_sp'); cpo = v('r_cpo');
    dailyBudget = sp > 0 ? (dailyRev / sp) * cpo : 0;
  }

  if (!dailyBudget || !sp || !cpo) { alert('Please fill in all fields!'); return; }

  var dailyOrders  = cpo > 0 ? dailyBudget / cpo : 0;
  var dailyRev     = dailyOrders * sp;
  var dailyCogs    = dailyOrders * cogs;
  var dailyProfit  = dailyRev - dailyCogs - dailyBudget;
  var roas         = dailyBudget > 0 ? dailyRev / dailyBudget : 0;
  var breakEvenRev = dailyBudget + dailyCogs;
  var breakEvenPct = dailyRev > 0 ? Math.min((dailyRev / breakEvenRev) * 100, 100) : 0;

  /* DAILY RESULTS */
  var rg = document.getElementById('results-grid');
  rg.innerHTML = metricHTML(fmt(dailyBudget), 'Daily Ad Spend', 'highlight') +
    metricHTML(fmtN(dailyOrders.toFixed(1)), 'Expected Orders', '') +
    metricHTML(fmt(dailyRev), 'Expected Revenue', 'highlight') +
    metricHTML(roas.toFixed(2) + '&times;', 'Estimated ROAS', '') +
    metricHTML(fmt(cpo), 'Cost Per Order', '') +
    metricHTML(fmt(dailyProfit), 'Profit Estimate', dailyProfit >= 0 ? 'profit-pos' : 'profit-neg', dailyProfit < 0);

  /* BREAKEVEN */
  document.getElementById('be-bar').style.width = breakEvenPct.toFixed(1) + '%';
  document.getElementById('be-pct').textContent = breakEvenPct.toFixed(1) + '%';
  document.getElementById('be-label-left').innerHTML = fmt(dailyBudget) + ' spend';
  document.getElementById('be-label-right').innerHTML = 'Break-even: ' + fmt(breakEvenRev);

  /* MONTHLY */
  var mg = document.getElementById('monthly-grid');
  mg.innerHTML = metricHTML(fmt(dailyBudget * 30), 'Monthly Ad Spend', 'highlight') +
    metricHTML(fmtN(Math.round(dailyOrders * 30)), 'Monthly Orders', '') +
    metricHTML(fmt(dailyRev * 30), 'Monthly Revenue', 'highlight') +
    metricHTML(fmt(dailyProfit * 30), 'Monthly Profit', dailyProfit >= 0 ? 'profit-pos' : 'profit-neg', dailyProfit < 0) +
    metricHTML(fmt(dailyCogs * 30), 'Monthly COGS', '') +
    metricHTML(roas.toFixed(2) + '&times;', 'ROAS', '');

  /* SCALE TABLE */
  var multipliers = [0.25, 0.5, 0.75, 1, 1.5, 2, 3, 5, 10];
  var rows = '';
  multipliers.forEach(function(m) {
    var db = dailyBudget * m;
    var do_ = db / cpo;
    var dr = do_ * sp;
    var dc = do_ * cogs;
    var dp = dr - dc - db;
    var r  = dr / db;
    var isCurrent = m === 1;
    rows += '<tr class="' + (isCurrent ? 'current-row' : '') + '">' +
      '<td>' + fmt(db) + '/day' + (isCurrent ? ' &#x2190; current' : '') + '</td>' +
      '<td>' + fmt(db * 30) + '/mo</td>' +
      '<td>' + do_.toFixed(1) + '</td>' +
      '<td>' + fmt(dr) + '</td>' +
      '<td>' + fmt(dp) + '</td>' +
      '<td>' + r.toFixed(2) + '&times;</td>' +
      '<td><span class="' + (dp >= 0 ? 'badge-profit' : 'badge-loss') + '">' + (dp >= 0 ? 'PROFIT' : 'LOSS') + '</span></td>' +
      '</tr>';
  });
  document.getElementById('scale-body').innerHTML = rows;

  /* SHOW */
  ['results-card','monthly-card','scale-card'].forEach(function(id){
    document.getElementById(id).classList.remove('hidden');
  });

  document.getElementById('results-card').scrollIntoView({ behavior:'smooth', block:'start' });
}

function metricHTML(val, lbl, cls, isNeg) {
  return '<div class="metric ' + cls + '">' +
    '<div class="metric-val' + (isNeg ? ' neg' : '') + '">' + val + '</div>' +
    '<div class="metric-lbl">' + lbl + '</div>' +
    '</div>';
}

function resetAll() {
  document.querySelectorAll('input').forEach(function(i){ i.value=''; });
  hideResults();
}
</script>
</body>
</html>
